# =============================================================================
# Cortex Docker Compose
# =============================================================================
#
# Usage:
#   Self-hosted:    docker compose up -d
#   Development:    docker compose -f compose.yaml -f compose.dev.yaml up -d postgres docling
#   Local build:    docker compose -f compose.yaml -f compose.dev.yaml -f compose.local.yaml up -d
#
# Compose files:
#   - compose.yaml       Base configuration (this file)
#   - compose.dev.yaml   Exposes Postgres port 5432 for local dev
#   - compose.local.yaml Generated by scripts/build.sh for local image testing
#
# Prerequisites:
#   1. Run setup script to generate .env with secrets
#   2. Start your LLM backend on the host
#
# LLM backends run on the host (not in containers) because they need GPU access.
# The app connects to them via host.docker.internal.
# =============================================================================

name: cortex

services:
  # ===========================================================================
  # Core Application
  # ===========================================================================
  cortex:
    image: ghcr.io/eclaire-labs/eclaire:${CORTEX_VERSION:-latest}
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # Runtime context - schema.ts derives all other defaults from this
      CORTEX_RUNTIME: container
      CORTEX_HOME: /app
      NODE_ENV: production
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      docling:
        condition: service_started
      graphiti:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-A", "Docker-Health-Check", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Document Processing
  # ===========================================================================
  docling:
    image: ghcr.io/docling-project/docling-serve:latest
    ports:
      - "5001:5001"
    # CPU mode by default (no GPU passthrough needed)
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  postgres:
    image: postgres:17.5-bookworm
    environment:
      POSTGRES_USER: ${DATABASE_USER:-cortex}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-cortex}
      POSTGRES_DB: ${DATABASE_NAME:-cortex}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-cortex}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Neo4j — Graph Database for Graphiti Knowledge Graph
  # ===========================================================================
  neo4j:
    image: neo4j:5.26.0
    container_name: cortex-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser (visual UI) — open http://localhost:7474
      - "7687:7687"   # Bolt protocol (used by Graphiti)
    volumes:
      - ./data/neo4j:/data
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-O", "-", "http://localhost:7474"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Graphiti — Knowledge Graph Service (Python FastAPI)
  # ===========================================================================
  graphiti:
    build:
      context: ../graphiti/server
      dockerfile: Dockerfile
    container_name: cortex-graphiti
    ports:
      - "8765:8000"
    environment:
      # LLM Configuration - defaults to Ollama (local, free)
      # For OpenAI: set GRAPHITI_OPENAI_API_KEY in .env and comment out Ollama config
      OPENAI_API_KEY: ${GRAPHITI_OPENAI_API_KEY:-ollama}
      OPENAI_BASE_URL: ${GRAPHITI_OPENAI_BASE_URL:-http://host.docker.internal:11434/v1}
      MODEL_NAME: ${GRAPHITI_MODEL_NAME:-llama3.1}
      EMBEDDING_BASE_URL: ${GRAPHITI_EMBEDDING_BASE_URL:-http://host.docker.internal:11434/v1}
      EMBEDDING_MODEL_NAME: ${GRAPHITI_EMBEDDING_MODEL:-nomic-embed-text}
      # Neo4j connection
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


